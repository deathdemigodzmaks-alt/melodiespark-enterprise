version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: melodiespark-postgres
    environment:
      POSTGRES_USER: melodiespark
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: melodiespark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melodiespark"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - melodiespark

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: melodiespark-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - melodiespark

  # Qdrant Vector Search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: melodiespark-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - melodiespark

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: melodiespark-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - melodiespark

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: melodiespark-grafana
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - melodiespark

  # ELK Stack - Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: melodiespark-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - melodiespark

  # ELK Stack - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.0.0
    container_name: melodiespark-kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - melodiespark

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

networks:
  melodiespark:
    driver: bridge
