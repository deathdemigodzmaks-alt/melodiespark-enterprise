apiVersion: apps/v1
kind: Deployment
metadata:
  name: melodiespark-api
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: melodiespark-api
  template:
    metadata:
      labels:
        app: melodiespark-api
    spec:
      containers:
      - name: api
        image: ghcr.io/YOUR_ORG/melodiespark-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: melodiespark-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: melodiespark-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: melodiespark-secrets
              key: jwt-secret
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: melodiespark-secrets
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: melodiespark-secrets
              key: openai-api-key
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: melodiespark-api
  namespace: production
spec:
  selector:
    app: melodiespark-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: melodiespark-web
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: melodiespark-web
  template:
    metadata:
      labels:
        app: melodiespark-web
    spec:
      containers:
      - name: web
        image: ghcr.io/YOUR_ORG/melodiespark-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.melodiespark.com"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 400m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: melodiespark-web
  namespace: production
spec:
  selector:
    app: melodiespark-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: melodiespark-ingress
  namespace: production
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - melodiespark.com
    - api.melodiespark.com
    secretName: melodiespark-tls
  rules:
  - host: api.melodiespark.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: melodiespark-api
            port:
              number: 80
  - host: melodiespark.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: melodiespark-web
            port:
              number: 80

---
apiVersion: v1
kind: Namespace
metadata:
  name: production
